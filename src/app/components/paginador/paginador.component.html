<div class="paginacao-container mt-2" *ngIf="totalPages > 1">
  <ul class="pagination mb-0">
    <li [class.disabled]="currentPage === 1">
      <a (click)="irParaPagina(1)" title="Primeira página" style="cursor: pointer;">
        <i class="bi bi-chevron-double-left"></i>
      </a>
    </li>
    <li [class.disabled]="currentPage === 1">
      <a (click)="irParaPagina(currentPage - 1)" style="cursor: pointer;">
        <i class="bi bi-chevron-left"></i> Anterior
      </a>
    </li>

    <li *ngFor="let pagina of getPaginas()" [class.active]="pagina === currentPage">
      <a (click)="irParaPagina(pagina)" style="cursor: pointer;">
        {{ pagina }}
      </a>
    </li>

    <li [class.disabled]="currentPage === totalPages">
      <a (click)="irParaPagina(currentPage + 1)" style="cursor: pointer;">
        Próxima <i class="bi bi-chevron-right"></i>
      </a>
    </li>
    <li [class.disabled]="currentPage === totalPages">
      <a (click)="irParaPagina(totalPages)" title="Última página" style="cursor: pointer;">
        <i class="bi bi-chevron-double-right"></i>
      </a>
    </li>
  </ul>

  <div class="ir-para-pagina ml-auto">
    <div class="d-flex justify-content-center align-items-center gap-2">
      <label class="mb-0 small text-muted">Ir para página:</label>
      <input type="number"
             class="form-control form-control-sm"
             [(ngModel)]="paginaInput"
             [min]="1"
             [max]="totalPages"
             (keyup.enter)="irParaPaginaDigitada()">
      <button class="btn btn-sm btn-outline-primary" (click)="irParaPaginaDigitada()">
        <i class="bi bi-arrow-right"></i>
      </button>
    </div>
  </div>
</div>
